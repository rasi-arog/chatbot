[phases.setup]
nixPkgs = ["ffmpeg", "python311"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu",
  "/opt/venv/bin/pip install --no-cache-dir --no-deps -r requirements.txt"
]

[start]
cmd = "/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
